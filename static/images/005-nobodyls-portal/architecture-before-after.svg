<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">nobodyls.cn before and after architecture</title>
  <desc id="desc">A comparison diagram showing the old split routing and the new portal based routing through Caddy.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#273136"/>
    </marker>
    <style>
      .bg { fill: #f6f1e8; }
      .panel { fill: #fffaf0; stroke: #d4c8b8; stroke-width: 2; }
      .box { fill: #ffffff; stroke: #293337; stroke-width: 2; rx: 8; }
      .soft { fill: #f2eadc; stroke: #d4c8b8; stroke-width: 2; rx: 8; }
      .good { fill: #e4f3ec; stroke: #1f7a5b; stroke-width: 2; rx: 8; }
      .warn { fill: #fff0e8; stroke: #a84735; stroke-width: 2; rx: 8; }
      .text { font-family: "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #1f292d; }
      .muted { fill: #667275; }
      .title { font-size: 26px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; }
      .line { fill: none; stroke: #273136; stroke-width: 2.2; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #a84735; stroke-width: 2; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1100" height="620"/>

  <text x="50" y="52" class="text title">改造前：入口分散，根域名服务器配置失效</text>
  <rect x="42" y="82" width="486" height="486" class="panel" rx="14"/>

  <rect x="82" y="126" width="170" height="70" class="box"/>
  <text x="110" y="156" class="text label">用户浏览器</text>
  <text x="111" y="179" class="text small muted">访问 nobodyls.cn</text>

  <rect x="310" y="126" width="170" height="70" class="soft"/>
  <text x="351" y="156" class="text label">DNS</text>
  <text x="327" y="179" class="text small muted">指向 GitHub Pages</text>
  <path d="M252 160 C270 160 288 160 310 160" class="line"/>

  <rect x="178" y="244" width="210" height="78" class="good"/>
  <text x="222" y="276" class="text label">GitHub Pages</text>
  <text x="204" y="300" class="text small muted">www.nobodyls.cn 博客</text>
  <path d="M394 196 C378 220 350 233 322 244" class="line"/>

  <rect x="82" y="388" width="170" height="70" class="soft"/>
  <text x="130" y="418" class="text label">Caddy</text>
  <text x="105" y="441" class="text small muted">有 nobodyls.cn 配置</text>

  <rect x="310" y="388" width="170" height="70" class="warn"/>
  <text x="355" y="418" class="text label">cpolar</text>
  <text x="352" y="441" class="text small muted">返回 404</text>
  <path d="M252 423 C274 423 292 423 310 423" class="dash"/>

  <text x="76" y="522" class="text small muted">问题：服务器里有根域名配置，但公网 DNS 没走服务器；配置本身还指向失效上游。</text>

  <text x="590" y="52" class="text title">改造后：根域名成为统一门户</text>
  <rect x="572" y="82" width="486" height="486" class="panel" rx="14"/>

  <rect x="612" y="126" width="170" height="70" class="box"/>
  <text x="640" y="156" class="text label">用户浏览器</text>
  <text x="638" y="179" class="text small muted">访问 nobodyls.cn/*</text>

  <rect x="840" y="126" width="170" height="70" class="soft"/>
  <text x="881" y="156" class="text label">DNS</text>
  <text x="860" y="179" class="text small muted">切到 8.155.163.203</text>
  <path d="M782 160 C802 160 820 160 840 160" class="line"/>

  <rect x="724" y="244" width="170" height="78" class="good"/>
  <text x="771" y="276" class="text label">Caddy</text>
  <text x="744" y="300" class="text small muted">按路径分发请求</text>
  <path d="M925 196 C910 220 872 233 836 244" class="line"/>

  <rect x="612" y="386" width="118" height="72" class="box"/>
  <text x="644" y="416" class="text label">/blog</text>
  <text x="628" y="440" class="text small muted">GitHub Pages</text>

  <rect x="756" y="386" width="118" height="72" class="box"/>
  <text x="786" y="416" class="text label">/image</text>
  <text x="778" y="440" class="text small muted">localhost:8092</text>

  <rect x="900" y="386" width="118" height="72" class="box"/>
  <text x="934" y="416" class="text label">/elec</text>
  <text x="923" y="440" class="text small muted">静态页 + API</text>

  <path d="M790 322 C750 350 708 362 674 386" class="line"/>
  <path d="M809 322 C810 350 813 362 815 386" class="line"/>
  <path d="M835 322 C876 350 921 362 958 386" class="line"/>

  <text x="606" y="522" class="text small muted">结果：根域名不再是单个页面，而是入口层；服务仍保持各自独立，Caddy 负责组合。</text>
</svg>
