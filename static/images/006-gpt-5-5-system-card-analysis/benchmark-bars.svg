<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">GPT-5.5 benchmark comparison</title>
  <desc id="desc">Selected benchmark scores for GPT-5.5, GPT-5.4, Claude Opus 4.7 and Gemini 3.1 Pro.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 1; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #4b5563; }
      .axis { stroke: #cbd5e1; stroke-width: 1; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .label { font: 600 14px Arial, sans-serif; fill: #111827; }
      .tick { font: 12px Arial, sans-serif; fill: #6b7280; }
      .value { font: 700 12px Arial, sans-serif; fill: #111827; }
      .legend { font: 13px Arial, sans-serif; fill: #374151; }
      .note { font: 12px Arial, sans-serif; fill: #64748b; }
      .gpt55 { fill: #0f766e; }
      .gpt54 { fill: #64748b; }
      .claude { fill: #b45309; }
      .gemini { fill: #2563eb; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="660"/>
  <rect class="panel" x="36" y="32" width="1048" height="592" rx="8"/>
  <text class="title" x="64" y="78">GPT-5.5 关键能力对比</text>
  <text class="subtitle" x="64" y="106">公开发布博客中的代表性指标。不同基准不可横向相加，只用于观察相对优势区域。</text>

  <g transform="translate(64 144)">
    <rect class="gpt55" x="0" y="0" width="18" height="18" rx="3"/>
    <text class="legend" x="26" y="14">GPT-5.5</text>
    <rect class="gpt54" x="120" y="0" width="18" height="18" rx="3"/>
    <text class="legend" x="146" y="14">GPT-5.4</text>
    <rect class="claude" x="232" y="0" width="18" height="18" rx="3"/>
    <text class="legend" x="258" y="14">Claude Opus 4.7</text>
    <rect class="gemini" x="410" y="0" width="18" height="18" rx="3"/>
    <text class="legend" x="436" y="14">Gemini 3.1 Pro</text>
  </g>

  <g transform="translate(260 184)">
    <line class="grid" x1="0" y1="0" x2="0" y2="352"/>
    <line class="grid" x1="160" y1="0" x2="160" y2="352"/>
    <line class="grid" x1="320" y1="0" x2="320" y2="352"/>
    <line class="grid" x1="480" y1="0" x2="480" y2="352"/>
    <line class="grid" x1="640" y1="0" x2="640" y2="352"/>
    <line class="axis" x1="0" y1="352" x2="640" y2="352"/>
    <text class="tick" x="-5" y="375" text-anchor="middle">0</text>
    <text class="tick" x="160" y="375" text-anchor="middle">25</text>
    <text class="tick" x="320" y="375" text-anchor="middle">50</text>
    <text class="tick" x="480" y="375" text-anchor="middle">75</text>
    <text class="tick" x="640" y="375" text-anchor="middle">100%</text>
  </g>

  <g transform="translate(64 190)">
    <text class="label" x="0" y="18">Terminal-Bench 2.0</text>
    <rect class="gpt55" x="196" y="0" width="529" height="14" rx="3"/>
    <rect class="gpt54" x="196" y="18" width="481" height="14" rx="3"/>
    <rect class="claude" x="196" y="36" width="444" height="14" rx="3"/>
    <rect class="gemini" x="196" y="54" width="438" height="14" rx="3"/>
    <text class="value" x="734" y="12">82.7</text>
    <text class="value" x="686" y="30">75.1</text>
    <text class="value" x="649" y="48">69.4</text>
    <text class="value" x="643" y="66">68.5</text>
  </g>

  <g transform="translate(64 278)">
    <text class="label" x="0" y="18">OSWorld-Verified</text>
    <rect class="gpt55" x="196" y="0" width="504" height="14" rx="3"/>
    <rect class="gpt54" x="196" y="18" width="480" height="14" rx="3"/>
    <rect class="claude" x="196" y="36" width="499" height="14" rx="3"/>
    <text class="value" x="710" y="12">78.7</text>
    <text class="value" x="686" y="30">75.0</text>
    <text class="value" x="705" y="48">78.0</text>
  </g>

  <g transform="translate(64 348)">
    <text class="label" x="0" y="18">BrowseComp</text>
    <rect class="gpt55" x="196" y="0" width="540" height="14" rx="3"/>
    <rect class="gpt54" x="196" y="18" width="529" height="14" rx="3"/>
    <rect class="claude" x="196" y="36" width="508" height="14" rx="3"/>
    <rect class="gemini" x="196" y="54" width="550" height="14" rx="3"/>
    <text class="value" x="746" y="12">84.4</text>
    <text class="value" x="735" y="30">82.7</text>
    <text class="value" x="714" y="48">79.3</text>
    <text class="value" x="756" y="66">85.9</text>
  </g>

  <g transform="translate(64 436)">
    <text class="label" x="0" y="18">FrontierMath T4</text>
    <rect class="gpt55" x="196" y="0" width="227" height="14" rx="3"/>
    <rect class="gpt54" x="196" y="18" width="173" height="14" rx="3"/>
    <rect class="claude" x="196" y="36" width="147" height="14" rx="3"/>
    <rect class="gemini" x="196" y="54" width="107" height="14" rx="3"/>
    <text class="value" x="432" y="12">35.4</text>
    <text class="value" x="379" y="30">27.1</text>
    <text class="value" x="353" y="48">22.9</text>
    <text class="value" x="313" y="66">16.7</text>
  </g>

  <g transform="translate(64 524)">
    <text class="label" x="0" y="18">CyberGym</text>
    <rect class="gpt55" x="196" y="0" width="524" height="14" rx="3"/>
    <rect class="gpt54" x="196" y="18" width="506" height="14" rx="3"/>
    <rect class="claude" x="196" y="36" width="468" height="14" rx="3"/>
    <text class="value" x="730" y="12">81.8</text>
    <text class="value" x="712" y="30">79.0</text>
    <text class="value" x="674" y="48">73.1</text>
  </g>

  <text class="note" x="64" y="596">数据源：OpenAI《Introducing GPT-5.5》评测表。SWE-Bench Pro 未放入图中，因为 OpenAI 同页注明该评测存在记忆化证据。</text>
</svg>
